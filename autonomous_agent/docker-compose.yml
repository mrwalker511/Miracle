services:
  # Database for Miracle Memory
  postgres:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_DB: autonomous_agent
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD env var must be set}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    mem_limit: 2g

  # LocalAI Service optimized for 16GB RAM
  local-ai:
    image: localai/localai:latest-cpu
    ports:
      - "8081:8080"
    environment:
      - MODELS_PATH=/models
      - DEBUG=true
    volumes:
      - ./models:/models
    mem_limit: 8g # Keeps 8GB free for Windows/Apps

volumes:
  postgres_data:
