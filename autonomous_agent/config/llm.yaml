# autonomous_agent/config/llm.yaml
# We use LiteLLM strings format e.g. "openai/gpt-4" or "ollama/llama3"
api_base: "http://localhost:8081/v1"
default_model: "qwen3-8b"
timeout: 60  # Local models can be slow; give them more time
max_retries: 3

llm:
  provider: "openai" # Not strictly required by litellm but conceptually useful
  api_key: ${OPENAI_API_KEY}  # Set via env var; omit for local providers that don't require a key
  base_url: ${LLM_BASE_URL:http://localhost:8081/v1} # Set endpoints easily
  organization: ${OPENAI_ORG_ID}  # Optional

  # Model selection - pointed at local Qwen 3 8B model via LocalAI
  models:
    planner: "qwen3-8b"
    coder: "qwen3-8b"
    tester: "qwen3-8b"
    reflector: "qwen3-8b"

    # Embedding model
    embedding: "text-embedding-3-large"

  # API parameters
  temperature: 0.2  # Low for code generation
  max_tokens: 4096
  top_p: 1.0
  frequency_penalty: 0.0
  presence_penalty: 0.0

  # Rate limiting
  requests_per_minute: 50
  tokens_per_minute: 150000

  # Retry logic
  retry:
    max_attempts: 3
    backoff_factor: 2
    initial_delay: 1

  # Function calling
  function_calling:
    enabled: true
    parallel_calls: true

  # Streaming (future)
  streaming:
    enabled: false

# Model fallback strategy
fallback:
  enabled: true
  sequence:
    - "qwen3-8b"
