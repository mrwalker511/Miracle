name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autonomous_agent

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: autonomous_agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q --ignore=tests/e2e --ignore=tests/integration
        env:
          OPENAI_API_KEY: dummy-key-for-unit-tests

      - name: Run E2E tests (mocked)
        run: pytest tests/e2e -q
        env:
          OPENAI_API_KEY: dummy-key-for-unit-tests

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autonomous_agent

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: autonomous_agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Security scan (bandit)
        run: bandit -r src/ -ll -q
        continue-on-error: true
